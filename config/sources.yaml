# Adapter registry (SPEC 6.1).
#
# adapter: dotted path to the Adapter class, resolved under src/.
# topic_hint: one of the SPEC 6.5 vocabulary values
#   (tech / ai / business / finance / world / regulation / science / cyber).
# max_items_per_run: hard cap enforced by the collector, per SPEC 6.1.
# enabled: false takes a source out of rotation without deleting its entry.
# feed_url: per-source feed/endpoint for adapters.rss.RSSAdapter, the one
#   generic class that serves every plain-RSS source. Bespoke adapters that
#   hardcode their own endpoint leave it unset.
#
# The v1 source list in SPEC 6.1. Keyed sources ship disabled until their
# credential is present, so unattended runs stay clean.

# --- API and bespoke, no key -------------------------------------------

- name: hackernews
  adapter: adapters.hackernews.HackerNewsAdapter
  topic_hint: tech
  enabled: true
  max_items_per_run: 40

- name: arxiv
  adapter: adapters.arxiv.ArxivAdapter
  topic_hint: ai
  enabled: true
  max_items_per_run: 30

- name: federal_register
  adapter: adapters.federal_register.FederalRegisterAdapter
  topic_hint: regulation
  enabled: true
  max_items_per_run: 30

- name: cisa
  adapter: adapters.cisa.CISAAdapter
  topic_hint: cyber
  enabled: true
  max_items_per_run: 30

# --- Plain RSS (generic RSSAdapter, feed lives in feed_url) -------------

- name: arstechnica
  adapter: adapters.arstechnica.ArsTechnicaAdapter
  topic_hint: tech
  enabled: true
  max_items_per_run: 40

- name: techcrunch
  adapter: adapters.rss.RSSAdapter
  topic_hint: tech
  enabled: true
  max_items_per_run: 30
  feed_url: "https://techcrunch.com/feed/"

- name: openai_blog
  adapter: adapters.rss.RSSAdapter
  topic_hint: ai
  enabled: true
  max_items_per_run: 20
  feed_url: "https://openai.com/blog/rss.xml"

# The two Google News topic feeds that used to sit here were removed. Their
# RSS links are opaque redirect shims: the page is ~580KB of JavaScript and
# carries neither the publisher URL nor the article text, so the enrichment
# step could never ground them and every story from them published as a flat
# card. These direct publisher feeds cover the same two topics and their
# article pages extract cleanly (2,400 to 5,100 characters, measured).

- name: the_verge
  adapter: adapters.rss.RSSAdapter
  topic_hint: tech
  enabled: true
  max_items_per_run: 25
  feed_url: "https://www.theverge.com/rss/index.xml"

- name: guardian_technology
  adapter: adapters.rss.RSSAdapter
  topic_hint: tech
  enabled: true
  max_items_per_run: 25
  feed_url: "https://www.theguardian.com/uk/technology/rss"

# The world beat. Direct publisher feeds (same hosts as bbc_business and
# guardian_technology, which ground cleanly), so world stories can field a
# section of their own instead of falling back to briefly.
- name: bbc_world
  adapter: adapters.rss.RSSAdapter
  topic_hint: world
  enabled: true
  max_items_per_run: 25
  feed_url: "https://feeds.bbci.co.uk/news/world/rss.xml"

- name: guardian_world
  adapter: adapters.rss.RSSAdapter
