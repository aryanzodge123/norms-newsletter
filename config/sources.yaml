# Adapter registry (SPEC 6.1).
#
# adapter: dotted path to the Adapter class, resolved under src/.
# topic_hint: one of the SPEC 6.5 vocabulary values, lowercased (tech / ai /
#   business / finance / politics / world / regulation / science / cyber).
#   Advisory provenance only: the scorer assigns each story its real topic,
#   so this is just the feed's dominant beat (SPEC 6.1).
# max_items_per_run: hard cap enforced by the collector, per SPEC 6.1.
# enabled: false takes a source out of rotation without deleting its entry.
# feed_url: per-source feed/endpoint for adapters.rss.RSSAdapter, the one
#   generic class that serves every plain-RSS source. Bespoke adapters that
#   hardcode their own endpoint leave it unset.
#
# The v1 source list in SPEC 6.1. Keyed sources ship disabled until their
# credential is present, so unattended runs stay clean.

# --- API and bespoke, no key -------------------------------------------

- name: hackernews
  adapter: adapters.hackernews.HackerNewsAdapter
  topic_hint: tech
  enabled: true
  max_items_per_run: 40

- name: arxiv
  adapter: adapters.arxiv.ArxivAdapter
  topic_hint: ai
  enabled: true
  max_items_per_run: 30

- name: federal_register
  adapter: adapters.federal_register.FederalRegisterAdapter
  topic_hint: regulation
  enabled: true
  max_items_per_run: 30

- name: cisa
  adapter: adapters.cisa.CISAAdapter
  topic_hint: cyber
  enabled: true
  max_items_per_run: 30

# --- Plain RSS (generic RSSAdapter, feed lives in feed_url) -------------

