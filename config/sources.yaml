  feed_url: "https://www.pbs.org/newshour/feeds/rss/world"

# The US Politics beat. This section had no dedicated source before; these two
# neutral public-broadcaster politics feeds staff it, the same pattern the
# world beat uses. topic_hint 'politics' is the hint form of the "US Politics"
