# The collector (decision #5, SPEC 6.2). Runs every 3 hours on GitHub Actions,
# writing bronze and silver to R2. This is the primary collector: on 2026-07-20
# the old local machine (a MacBook Air that slept) stopped collecting while no
# cloud collector was enabled, silver went empty, and the 2026-07-21 edition
# degraded to a fallback. Running it here removes that single point of failure.
# The collector is idempotent (bronze dedups), so an optional local run
# overlapping with this is harmless. workflow_dispatch still runs it on demand.
name: collect

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours (SPEC 6.2)

permissions:
  contents: read

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      R2_CATALOG_URI: ${{ secrets.R2_CATALOG_URI }}
      R2_WAREHOUSE: ${{ secrets.R2_WAREHOUSE }}
      R2_TOKEN: ${{ secrets.R2_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # newsapi is enabled in config/sources.yaml, so the job needs its key or
      # every scheduled run comes back "partial" with newsapi as the lone
      # failed adapter (the collector caught it and continued). The secret was
      # already present in the repo; it just was not wired into this job.
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      HEALTHCHECKS_COLLECT_URL: ${{ secrets.HEALTHCHECKS_COLLECT_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --frozen

      # SPEC 6.2: collect into bronze. The collector pings the collector
      # cadence check itself (src/health.py), so the mini PC and this
      # fallback share one dead man's switch.
      - name: Collect
        run: uv run python -m src.collector

      # Chain silver after the collect cycle (deferred from M2). Re-clusters
      # and re-scores the whole day; incremental scoring keeps the cost near
      # zero when nothing changed (decision #6).
      - name: Silver
        run: uv run python -m src.silver.run_silver
